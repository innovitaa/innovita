<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:black;
    font-family:'Poppins',sans-serif;
    color:white;
    text-align:center;
}

/* ===== العرض السينمائي ===== */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:introFade 4.5s forwards;
}

.cinematic-title{
    font-family:'Cinzel',serif;
    font-size:50px;
    letter-spacing:6px;
}

.cinematic-title span{
    opacity:0;
    color:#d4af37;
    display:inline-block;
    transform:translateY(40px);
    filter:blur(8px);
    animation:letterReveal 1.2s forwards;
}

.cinematic-title span:nth-child(1){animation-delay:0.2s;}
.cinematic-title span:nth-child(2){animation-delay:0.4s;}
.cinematic-title span:nth-child(3){animation-delay:0.6s;}
.cinematic-title span:nth-child(4){animation-delay:0.8s;}
.cinematic-title span:nth-child(5){animation-delay:1s;}
.cinematic-title span:nth-child(6){animation-delay:1.2s;}
.cinematic-title span:nth-child(7){animation-delay:1.4s;}
.cinematic-title span:nth-child(8){animation-delay:1.6s;}

/* ظهور ضبابي ثم واضح */
@keyframes letterReveal{
    0%{
        opacity:0;
        transform:translateY(40px);
        filter:blur(8px);
    }
    50%{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
        text-shadow:0 0 20px #d4af37;
    }
    100%{
        opacity:1;
        filter:blur(0);
        text-shadow:0 0 25px #d4af37;
    }
}

/* بقاء العرض ثم الخروج */
@keyframes introFade{
    0%{opacity:1;}
    65%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* ===== الصفحة الرئيسية ===== */

.container{
    width:100%;
    max-width:500px;
    margin:50px auto 0;
    padding:0 20px;
}

/* اللوغو */
.logo{
    width:180px;
    height:auto;
    animation: letterReveal 1.5s ease-out forwards;
}

/* العنوان */
h1{
    font-family:'Cinzel',serif;
    font-size:34px;
    letter-spacing:3px;
    text-transform:uppercase;
    background: linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
    animation: letterReveal 1.2s ease-out forwards;
}

/* النص الفرعي */
.subtitle{
    color:#d4af37;
    margin-bottom:25px;
    animation: letterReveal 1.6s ease-out forwards;
}

/* الروابط */
.links a{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:12px auto;
    padding:16px;
    border-radius:14px;
    text-decoration:none;
    font-weight:500;
    color:#d4af37;
    border:1px solid #d4af37;
    max-width:350px;
    transition:0.3s;
    animation: fadeUp 1s ease-out forwards;
}

.links a:nth-child(1){animation-delay:1.8s;}
.links a:nth-child(2){animation-delay:2s;}
.links a:nth-child(3){animation-delay:2.2s;}
.links a:nth-child(4){animation-delay:2.4s;}

.links a:hover{
    background:#d4af37;
    color:black;
    transform:scale(1.05);
}

/* زر الانضمام */
.join-btn{
    margin-top:20px;
    font-weight:bold;
    letter-spacing:1px;
    border:none !important;
    color:black !important;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
}

/* زر عائم */
.floating-join{
    position:fixed;
    bottom:20px;
    right:20px;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    color:black;
    padding:14px 22px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 25px #d4af37;
}

/* تأثيرات إضافية */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* متجاوب للهاتف */
@media (max-width:600px){
    .cinematic-title{
        font-size:38px;
    }
    .logo{
        width:150px;
    }
    h1{
        font-size:28px;
    }
    .links a{
        max-width:100%;
        padding:14px;
    }
    .floating-join{
        padding:12px 18px;
    }
}
</style>
</head>

           target="_blank"

           ⚜ انضم إلينا من هنا ⚜

</html>
