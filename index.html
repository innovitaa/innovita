<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* INTRO */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:introFade 6s forwards;
}

.cinematic-title{
    font-family:'Cinzel',serif;
    font-size:55px;
    letter-spacing:8px;
}

.cinematic-title span{
    opacity:0;
    color:#d4af37;
    display:inline-block;
    transform:translateY(40px);
    animation:letterReveal 0.6s forwards;
}

.cinematic-title span:nth-child(1){animation-delay:0.2s;}
.cinematic-title span:nth-child(2){animation-delay:0.4s;}
.cinematic-title span:nth-child(3){animation-delay:0.6s;}
.cinematic-title span:nth-child(4){animation-delay:0.8s;}
.cinematic-title span:nth-child(5){animation-delay:1s;}
.cinematic-title span:nth-child(6){animation-delay:1.2s;}
.cinematic-title span:nth-child(7){animation-delay:1.4s;}
.cinematic-title span:nth-child(8){animation-delay:1.6s;}

@keyframes letterReveal{
    to{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 20px #d4af37;
    }
}

@keyframes introFade{
    0%{opacity:1;}
    85%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* MAIN */

.container{
    width:420px;
    padding:60px 45px 45px;
    border-radius:25px;
    background: rgba(0,0,0,0.88);
    box-shadow:0 0 60px rgba(212,175,55,0.6);
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    animation: reveal 3s 5.5s forwards;
    position:relative;
}

@keyframes reveal{to{opacity:1; transform:translateY(0);}}

/* LOGO بدون تضليل */

.logo{
    width:120px;
    margin-bottom:15px;
}

/* TEXT */

h1{
    font-family:'Cinzel',serif;
    font-size:32px;
    background: linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.subtitle{
    color:#d4af37;
    margin-bottom:25px;
}

/* LINKS */

.links a{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:12px 0;
    padding:12px;
    border-radius:15px;
    text-decoration:none;
    font-weight:500;
    color:#d4af37;
    border:1px solid #d4af37;
    transition:0.4s;
}

.links a:hover{
    background:#d4af37;
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 20px #d4af37;
}

/* JOIN BUTTON */

.join-btn{
    margin-top:20px;
    font-weight:bold;
    border:none !important;
    color:black !important;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    box-shadow:0 0 25px rgba(212,175,55,0.8);
}

.join-btn:hover{
    transform:scale(1.1);
}

/* CONTACT */

.contact-title{
    margin-top:25px;
    font-size:15px;
    color:#d4af37;
    letter-spacing:1px;
}

.phone{
    margin-top:10px;
    font-size:14px;
}

.phone a{
    color:white;
    text-decoration:none;
}

.phone a:hover{
    color:#d4af37;
}

/* FLOATING BUTTON */

.floating-join{
    position:fixed;
    bottom:25px;
    right:25px;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    color:black;
    padding:14px 20px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 25px #d4af37;
}
</style>
</head>
