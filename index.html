<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innovita Club | Elite Society</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* شاشة الدخول السينمائية */
.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:introFade 4s forwards;
}

.intro h1{
    font-family:'Cinzel',serif;
    font-size:40px;
    color:#d4af37;
    letter-spacing:4px;
    animation: glow 2s infinite alternate;
}

@keyframes introFade{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

@keyframes glow{
    from{text-shadow:0 0 10px #d4af37;}
    to{text-shadow:0 0 30px #f5e6a8;}
}

/* خلفية دخان */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle,rgba(212,175,55,0.15),transparent 60%);
    animation: smoke 15s linear infinite;
}

@keyframes smoke{
    from{transform:translate(-25%,-25%) rotate(0deg);}
    to{transform:translate(-25%,-25%) rotate(360deg);}
}

.container{
    width:420px;
    padding:45px;
    border-radius:25px;
    background: rgba(0,0,0,0.85);
    box-shadow:0 0 50px rgba(212,175,55,0.5);
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    animation: reveal 3s 3.5s forwards;
}

@keyframes reveal{
    to{opacity:1; transform:translateY(0);}
}

.logo{
    width:120px;
    margin-bottom:15px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

h1{
    font-family:'Cinzel',serif;
    font-size:32px;
    background: linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.subtitle{
    color:#d4af37;
    margin-bottom:25px;
}

.links a{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:12px 0;
    padding:12px;
    border-radius:15px;
    text-decoration:none;
    font-weight:500;
    color:#d4af37;
    border:1px solid #d4af37;
    transition:0.4s;
}

.links a:hover{
    background:#d4af37;
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 20px #d4af37;
}

.contact-title{
    margin-top:25px;
    font-size:15px;
    color:#d4af37;
    letter-spacing:1px;
}

.phone{
    margin-top:10px;
    font-size:14px;
    color:white;
    text-shadow:0 0 8px rgba(255,255,255,0.6);
}

.phone a{
    color:white;
    text-decoration:none;
}

.phone a:hover{
    color:#d4af37;
}

.elite{
    margin-top:20px;
    font-size:12px;
    color:#aaa;
    border-top:1px solid rgba(212,175,55,0.3);
    padding-top:15px;
}
</style>
</head>

<body>

<div class="intro">
    <h1>INNOVITA CLUB</h1>
</div>

<div class="container">

<img src="logo.png" class="logo" alt="Innovita Logo">

<h1>INNOVITA</h1>
<div class="subtitle">Elite Scientific Society</div>

<div class="links">
    <a href="https://instagram.com/yourpage" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>
    <a href="https://facebook.com/yourpage" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
    </a>
    <a href="https://tiktok.com/@yourpage" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
</div>

<div class="contact-title">
اتصل بنا للمزيد من المعلومات
</div>

<div class="phone">
📞 <a href="tel:+213559920007">+213559920007</a> <br>
📞 <a href="tel:+213562416138">+213562416138</a>
</div>

<div class="elite">
⚜ INNOVATE• CREATE • CONNECT⚜
</div>

</div>

</body>
</html>
