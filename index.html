<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* ================= INTRO CINEMATIC ================= */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    overflow:hidden;
    animation:introFade 6s forwards;
}

.intro::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(212,175,55,0.08), transparent 60%);
    animation:rotateSmoke 20s linear infinite;
}

@keyframes rotateSmoke{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.intro-content{text-align:center;position:relative;}

.cinematic-title{
    font-family:'Cinzel',serif;
    font-size:55px;
    letter-spacing:8px;
}

.cinematic-title span{
    opacity:0;
    color:#d4af37;
    display:inline-block;
    transform:translateY(40px);
    animation:letterReveal 0.6s forwards;
}

.cinematic-title span:nth-child(1){animation-delay:0.2s;}
.cinematic-title span:nth-child(2){animation-delay:0.4s;}
.cinematic-title span:nth-child(3){animation-delay:0.6s;}
.cinematic-title span:nth-child(4){animation-delay:0.8s;}
.cinematic-title span:nth-child(5){animation-delay:1s;}
.cinematic-title span:nth-child(6){animation-delay:1.2s;}
.cinematic-title span:nth-child(7){animation-delay:1.4s;}
.cinematic-title span:nth-child(8){animation-delay:1.6s;}

@keyframes letterReveal{
    to{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 20px #d4af37;
    }
}

.gold-line{
    width:0;
    height:2px;
    background:linear-gradient(90deg,transparent,#d4af37,transparent);
    margin:20px auto 0;
    animation:lineExpand 1.5s 2s forwards;
}

@keyframes lineExpand{to{width:300px;}}

@keyframes introFade{
    0%{opacity:1;}
    85%{opacity:1;}
    100%{opacity:0;visibility:hidden;transform:scale(1.1);}
}

/* ================= MAIN ================= */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle,rgba(212,175,55,0.15),transparent 60%);
    animation: smoke 15s linear infinite;
}

@keyframes smoke{
    from{transform:translate(-25%,-25%) rotate(0deg);}
    to{transform:translate(-25%,-25%) rotate(360deg);}
}

.container{
    width:420px;
    padding:60px 45px 45px;
    border-radius:25px;
    background: rgba(0,0,0,0.88);
    box-shadow:0 0 60px rgba(212,175,55,0.6);
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    animation: reveal 3s 5.5s forwards;
    position:relative;
}

@keyframes reveal{to{opacity:1; transform:translateY(0);}}

/* LOGO */
.logo-wrapper{
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    padding:4px;
    box-shadow:0 0 30px #d4af37;
}

.logo{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    background:black;
}

h1{
    font-family:'Cinzel',serif;
    font-size:32px;
    background: linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-top:60px;
    margin-bottom:10px;
}

.subtitle{
    color:#d4af37;
    margin-bottom:25px;
    letter-spacing:1px;
}

/* SOCIAL */
.links a{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:12px 0;
    padding:12px;
    border-radius:15px;
    text-decoration:none;
    font-weight:500;
    color:#d4af37;
    border:1px solid #d4af37;
    transition:0.4s;
}

.links a:hover{
    background:#d4af37;
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 20px #d4af37;
}

/* JOIN BUTTON MAIN */
.join-btn{
    margin-top:20px;
    position:relative;
    overflow:hidden;
    font-weight:bold;
    letter-spacing:1px;
    border:none !important;
    color:black !important;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    box-shadow:0 0 25px rgba(212,175,55,0.8);
    transition:0.4s;
    animation:fadeInJoin 1.5s 6.5s forwards, pulse 2s infinite 8s;
    opacity:0;
    transform:translateY(20px);
}

.join-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
}

.join-btn:hover::before{left:100%;transition:0.5s;}

.join-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px #f5e6a8;
}

@keyframes fadeInJoin{to{opacity:1;transform:translateY(0);}}

@keyframes pulse{
    0%{box-shadow:0 0 25px rgba(212,175,55,0.8);}
    50%{box-shadow:0 0 45px rgba(245,230,168,1);}
    100%{box-shadow:0 0 25px rgba(212,175,55,0.8);}
}

/* FLOATING BUTTON */
.floating-join{
    position:fixed;
    bottom:25px;
    right:25px;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    color:black;
    padding:14px 20px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 25px #d4af37;
    animation:pulse 2s infinite;
    z-index:1000;
}
</style>
</head>
