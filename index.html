<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    color:white;
}

/* ================= INTRO CINEMATIC ================= */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    overflow:hidden;
    animation:introFade 6s forwards;
}

.intro::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(212,175,55,0.08), transparent 60%);
    animation:rotateSmoke 20s linear infinite;
}

@keyframes rotateSmoke{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.intro-content{
    text-align:center;
    position:relative;
}

.cinematic-title{
    font-family:'Cinzel',serif;
    font-size:55px;
    letter-spacing:8px;
}

.cinematic-title span{
    opacity:0;
    color:#d4af37;
    display:inline-block;
    transform:translateY(40px);
    animation:letterReveal 0.6s forwards;
}

.cinematic-title span:nth-child(1){animation-delay:0.2s;}
.cinematic-title span:nth-child(2){animation-delay:0.4s;}
.cinematic-title span:nth-child(3){animation-delay:0.6s;}
.cinematic-title span:nth-child(4){animation-delay:0.8s;}
.cinematic-title span:nth-child(5){animation-delay:1s;}
.cinematic-title span:nth-child(6){animation-delay:1.2s;}
.cinematic-title span:nth-child(7){animation-delay:1.4s;}
.cinematic-title span:nth-child(8){animation-delay:1.6s;}

@keyframes letterReveal{
    to{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 20px #d4af37;
    }
}

.gold-line{
    width:0;
    height:2px;
    background:linear-gradient(90deg,transparent,#d4af37,transparent);
    margin:20px auto 0;
    animation:lineExpand 1.5s 2s forwards;
}

@keyframes lineExpand{
    to{width:300px;}
}

@keyframes introFade{
    0%{opacity:1;}
    85%{opacity:1;}
    100%{
        opacity:0;
        visibility:hidden;
        transform:scale(1.1);
    }
}

/* ================= MAIN CONTAINER ================= */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle,rgba(212,175,55,0.15),transparent 60%);
    animation: smoke 15s linear infinite;
}

@keyframes smoke{
    from{transform:translate(-25%,-25%) rotate(0deg);}
    to{transform:translate(-25%,-25%) rotate(360deg);}
}

.container{
    width:420px;
    padding:60px 45px 45px 45px;
    border-radius:25px;
    background: rgba(0,0,0,0.88);
    box-shadow:0 0 60px rgba(212,175,55,0.6);
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    animation: reveal 3s 5.5s forwards;
    position:relative;
}

@keyframes reveal{
    to{opacity:1; transform:translateY(0);}
}

/* ===== LOGO ===== */

.logo-wrapper{
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    padding:4px;
    box-shadow:0 0 30px #d4af37;
}

.logo{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    background:black;
}

h1{
    font-family:'Cinzel',serif;
    font-size:32px;
    background: linear-gradient(45deg,#d4af37,#f5e6a8,#d4af37);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-top:60px;
    margin-bottom:10px;
}

.subtitle{
    color:#d4af37;
    margin-bottom:25px;
    letter-spacing:1px;
}

.links a{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:12px 0;
    padding:12px;
    border-radius:15px;
    text-decoration:none;
    font-weight:500;
    color:#d4af37;
    border:1px solid #d4af37;
    transition:0.4s;
}

.links a:hover{
    background:#d4af37;
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 20px #d4af37;
}

.contact-title{
    margin-top:25px;
    font-size:15px;
    color:#d4af37;
    letter-spacing:1px;
}

.phone{

.phone a{

.phone a:hover{

.elite{

    color:#aaa;
    border-top:1px solid rgba(212,175,55,0.3);
    padding-top:15px;
}
</style>
